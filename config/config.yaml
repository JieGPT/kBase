name: "kBase"
version: "0.1.0-mvp"
debug: false

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  temperature: 0.7
  max_tokens: 2048

embedding:
  provider: "openai"
  model: "text-embedding-3-small"

vector_db:
  type: "chromadb"
  persist_path: "./data/chromadb"
  collection_name: "documents"

document_storage:
  path: "./docs"
  supported_formats:
    - ".pdf"
    - ".txt"

chunking:
  chunk_size: 1000
  chunk_overlap: 200

memory:
  max_turns: 5

retrieval:
  top_k: 5